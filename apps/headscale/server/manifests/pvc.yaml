apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: headscale-data
  namespace: halo
  labels:
    recurring-job-group.longhorn.io/default: "enabled"
    recurring-job.longhorn.io/random-volumes: "enabled"
    recurring-job.longhorn.io/s3-monthly-backup: "enabled"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn
