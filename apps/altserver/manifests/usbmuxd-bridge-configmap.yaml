apiVersion: v1
kind: ConfigMap
metadata:
  name: usbmuxd-bridge-script
  namespace: halo
data:
  bridge.py: |
    #!/usr/bin/env python3
    """
    usbmuxd-bridge: exposes a known iOS device (by IP) to libimobiledevice/AltServer
    without requiring mDNS (_apple-mobdev2._tcp) discovery.

    iOS 17+ does not reliably advertise _apple-mobdev2._tcp, so netmuxd cannot
    auto-discover the device. This script replaces netmuxd by implementing the
    usbmuxd wire protocol on a Unix socket, routing Connect requests directly to
    the iPhone's lockdownd TCP port.

    Environment:
      IPHONE_IP   - iPhone's IP address (e.g. 192.168.8.101)
      IPHONE_UDID - iPhone's UDID (e.g. 00008101-000E00E01A21001E)
      SOCKET_PATH - usbmuxd socket path (default: /var/run/usbmuxd)
      LOCKDOWN_DIR - directory containing <UDID>.plist (default: /var/lib/lockdown)
    """
    import asyncio
    import logging
    import os
    import plistlib
    import socket
    import struct
    import sys

    logging.basicConfig(
        level=logging.INFO,
        format='%(asctime)s usbmuxd-bridge %(message)s',
        stream=sys.stdout,
    )
    log = logging.getLogger('bridge')

    IPHONE_IP   = os.environ['IPHONE_IP']
    IPHONE_UDID = os.environ['IPHONE_UDID']
    SOCKET_PATH  = os.environ.get('SOCKET_PATH', '/var/run/usbmuxd')
    LOCKDOWN_DIR = os.environ.get('LOCKDOWN_DIR', '/var/lib/lockdown')
    DEVICE_ID    = 1

    def _network_address(ip: str) -> bytes:
        """Pack an IPv4 address as a usbmuxd NetworkAddress (sockaddr_in, 16 bytes)."""
        packed = socket.inet_aton(ip)
        # AF_INET=2, port=0, addr, 8 zero bytes
        return struct.pack('!HH', 2, 0) + packed + b'\x00' * 8

    DEVICE_ENTRY = {
        'DeviceID': DEVICE_ID,
        'MessageType': 'Attached',
        'Properties': {
            'ConnectionType': 'Network',
            'DeviceID': DEVICE_ID,
            'EscapedFullServiceName': f'{IPHONE_UDID}@{IPHONE_IP}',
            'InterfaceIndex': 1,
            'NetworkAddress': _network_address(IPHONE_IP),
            'SerialNumber': IPHONE_UDID,
        },
    }

    # ── usbmuxd wire protocol helpers ──────────────────────────────────────────
    # Protocol versions: 0 = binary plist, 1 = XML plist
    # We mirror whatever version the client uses so we don't mismatch.

    def _encode(tag: int, payload: dict, version: int = 1) -> bytes:
        fmt = plistlib.FMT_XML if version == 1 else plistlib.FMT_BINARY
        body = plistlib.dumps(payload, fmt=fmt)
        header = struct.pack('<IIII', 16 + len(body), version, 8, tag)
        return header + body

    def _decode(buf: bytes):
        """Return (tag, version, payload, remaining_bytes) or (None, None, None, buf) if incomplete."""
        if len(buf) < 16:
            return None, None, None, buf
        total_len = struct.unpack('<I', buf[:4])[0]
        if len(buf) < total_len:
            return None, None, None, buf
        version = struct.unpack('<I', buf[4:8])[0]
        tag = struct.unpack('<I', buf[12:16])[0]
        payload = plistlib.loads(buf[16:total_len])
        return tag, version, payload, buf[total_len:]

    # ── connection handler ──────────────────────────────────────────────────────

    class Handler:
        def __init__(self, reader: asyncio.StreamReader, writer: asyncio.StreamWriter):
            self._r = reader
            self._w = writer
            self._buf = b''
            self._version = 1  # default to XML; updated from first packet

        async def run(self):
            try:
                while True:
                    chunk = await self._r.read(65536)
                    if not chunk:
                        break
                    self._buf += chunk
                    while True:
                        tag, version, payload, self._buf = _decode(self._buf)
                        if payload is None:
                            break
                        self._version = version  # mirror client's plist format
                        if not await self._dispatch(tag, payload):
                            return
            except (ConnectionResetError, asyncio.CancelledError, BrokenPipeError):
                pass
            finally:
                try:
                    self._w.close()
                except Exception:
                    pass

        def _send(self, tag: int, payload: dict):
            self._w.write(_encode(tag, payload, self._version))

        async def _dispatch(self, tag: int, msg: dict) -> bool:
            mtype = msg.get('MessageType', '')
            log.info('< %s', mtype)

            if mtype == 'Listen':
                self._send(tag, {'MessageType': 'Result', 'Number': 0})
                # Immediately announce our device
                self._send(0, DEVICE_ENTRY)
                await self._w.drain()

            elif mtype == 'ListDevices':
                self._send(tag, {'DeviceList': [DEVICE_ENTRY]})
                await self._w.drain()

            elif mtype in ('GetBuid', 'ReadBUID'):
                self._send(tag, {'BUID': 'ffffffff-ffff-ffff-ffff-ffffffffffff'})
                await self._w.drain()

            elif mtype == 'ReadPairRecord':
                udid = msg.get('PairRecordID', IPHONE_UDID)
                path = os.path.join(LOCKDOWN_DIR, f'{udid}.plist')
                try:
                    data = open(path, 'rb').read()
                    self._send(tag, {'PairRecordData': data})
                except FileNotFoundError:
                    self._send(tag, {'Error': 'NotFound'})
                await self._w.drain()

            elif mtype == 'SavePairRecord':
                udid = msg.get('PairRecordID', IPHONE_UDID)
                path = os.path.join(LOCKDOWN_DIR, f'{udid}.plist')
                data = msg.get('PairRecordData', b'')
                if isinstance(data, bytes) and data:
                    open(path, 'wb').write(data)
                self._send(tag, {'MessageType': 'Result', 'Number': 0})
                await self._w.drain()

            elif mtype == 'Connect':
                port_be = msg.get('PortNumber', 0)
                port = socket.ntohs(port_be & 0xFFFF)
                log.info('> Connect to %s:%d', IPHONE_IP, port)
                try:
                    ir, iw = await asyncio.open_connection(IPHONE_IP, port)
                    self._send(tag, {'MessageType': 'Result', 'Number': 0})
                    await self._w.drain()
                    # Transparent proxy — run until either side closes
                    await asyncio.gather(
                        _pipe(self._r, iw),
                        _pipe(ir, self._w),
                        return_exceptions=True,
                    )
                except Exception as exc:
                    log.warning('Connect failed: %s', exc)
                    self._send(tag, {'MessageType': 'Result', 'Number': 3})
                    await self._w.drain()
                return False  # connection is done

            else:
                log.warning('unhandled: %s', mtype)
                self._send(tag, {'MessageType': 'Result', 'Number': 0})
                await self._w.drain()

            return True

    async def _pipe(reader: asyncio.StreamReader, writer: asyncio.StreamWriter):
        try:
            while True:
                data = await reader.read(65536)
                if not data:
                    break
                writer.write(data)
                await writer.drain()
        except Exception:
            pass
        finally:
            try:
                writer.close()
            except Exception:
                pass

    # ── main ───────────────────────────────────────────────────────────────────

    async def main():
        if os.path.exists(SOCKET_PATH):
            os.unlink(SOCKET_PATH)

        async def on_client(reader, writer):
            asyncio.create_task(Handler(reader, writer).run())

        server = await asyncio.start_unix_server(on_client, SOCKET_PATH)
        os.chmod(SOCKET_PATH, 0o666)
        log.info('listening on %s', SOCKET_PATH)
        log.info('device %s @ %s', IPHONE_UDID, IPHONE_IP)

        async with server:
            await server.serve_forever()

    asyncio.run(main())
