# AltServer-Linux — automatic WiFi re-signing for sideloaded iOS apps (AltStore).
#
# ONE-TIME SETUP — pair your iPhone on any PC, then copy the file into the pod:
#
#   On macOS (14+):  pip3 install pymobiledevice3
#                    python3 -m pymobiledevice3 lockdown save-pair-record ~/<UDID>.plist
#   On Linux:  apt install libimobiledevice-utils
#   → Plug iPhone into that PC, tap "Trust" on the phone.
#     On macOS 14+ /var/db/lockdown is protected even from sudo — use pymobiledevice3
#     as above to export through the usbmuxd socket instead.
#     On Linux the pairing file appears at: /var/lib/lockdown/<UDID>.plist
#
#   Copy it into the running pod (no USB connection to the cluster ever needed):
#     POD=$(kubectl get pod -n halo -l app=altserver -o jsonpath='{.items[0].metadata.name}')
#     kubectl cp ~/<UDID>.plist halo/$POD:/var/lib/lockdown/<UDID>.plist -c altserver
#
#   Done. AltStore discovers this server via mDNS and refreshes sideloaded apps
#   over WiFi automatically every 7 days. The pairing file is persisted in the
#   Longhorn PVC and backed up to S3, so this step is truly one-time.
#
# Three containers in this pod:
#   avahi     — advertises _altserver._tcp via mDNS so iOS devices auto-discover the server
#   altserver — AltServer-Linux + netmuxd (aizhihuxiao/gta-altserver, ARM64)
#   anisette  — Apple authentication token server (dadoum/anisette-v3-server, ARM64)
#
# mDNS advertisement design:
#   The GTA-AltServer image has no python3, so its built-in DNSServiceRegister
#   path always fails silently. Instead:
#     1. altserver container creates a fake /tmp/python3 shell wrapper that
#        extracts AltServer's dynamic port and writes it to the service-info emptyDir.
#     2. avahi container watches for that file and calls avahi-publish-service
#        to advertise _altserver._tcp on the LAN with the correct port.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altserver
  namespace: halo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: altserver
  template:
    metadata:
      labels:
        app: altserver
    spec:
      # hostNetwork is required so avahi broadcasts _altserver._tcp mDNS on the real
      # LAN (192.168.8.x), allowing iOS devices to auto-discover this server.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: regcred
      initContainers:
        # Longhorn mounts PVC subPaths as root:root. This init container runs as
        # root and chowns /var/lib/lockdown to the altserver user (uid 10001) so
        # kubectl cp can write pairing files there.
        - name: fix-lockdown-perms
          image: busybox:latest
          command: ["sh", "-c", "chown -R 10001:10001 /var/lib/lockdown"]
          volumeMounts:
            - name: altserver-data
              mountPath: /var/lib/lockdown
              subPath: lockdown

      containers:
        # ── avahi ──────────────────────────────────────────────────────────────
        # Installs dbus + avahi-daemon + avahi-utils, then:
        #   1. Starts avahi-daemon in the background.
        #   2. Waits for the altserver container to write its port to service-info.
        #   3. Calls avahi-publish-service to advertise _altserver._tcp on the LAN.
        - name: avahi
          image: debian:bookworm-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              apt-get update -qq && apt-get install -y -qq avahi-daemon avahi-utils dbus
              mkdir -p /run/dbus /run/avahi-daemon
              dbus-daemon --system --fork
              avahi-daemon --no-drop-root --no-chroot &
              AVAHI_PID=$!
              echo "Waiting for AltServer port..."
              while [ ! -s /tmp/service-info/altserver-port ]; do
                kill -0 $AVAHI_PID 2>/dev/null || { echo "avahi-daemon died"; exit 1; }
                sleep 1
              done
              PORT=$(cat /tmp/service-info/altserver-port)
              echo "Registering _altserver._tcp on port $PORT"
              avahi-publish-service "AltServer" "_altserver._tcp" "$PORT" "serverID=1234567" &
              wait $AVAHI_PID
          securityContext:
            capabilities:
              add:
                - NET_ADMIN  # join multicast group 224.0.0.251
                - NET_RAW    # raw socket for mDNS packets
          volumeMounts:
            - name: dbus-socket
              mountPath: /run/dbus
            - name: service-info
              mountPath: /tmp/service-info
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

        # ── altserver ──────────────────────────────────────────────────────────
        # ARM64 image (aizhihuxiao/gta-altserver) with AltServer-Linux.
        # Device connectivity is handled by the usbmuxd-bridge sidecar rather
        # than netmuxd, because iOS 17+ no longer reliably advertises
        # _apple-mobdev2._tcp which netmuxd depends on for WiFi discovery.
        #
        # A fake /tmp/python3 shell wrapper intercepts AltServer's DNSServiceRegister
        # call, extracts the dynamic port, and writes it to service-info for the
        # avahi sidecar to pick up.
        - name: altserver
          image: aizhihuxiao/gta-altserver:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /tmp/service-info
              echo '#!/bin/sh' > /tmp/python3
              echo 'PORT=$(echo "$2" | grep -oE "port = [0-9]+" | grep -oE "[0-9]+$")' >> /tmp/python3
              echo '[ -n "$PORT" ] && echo "$PORT" > /tmp/service-info/altserver-port' >> /tmp/python3
              echo 'sleep 365d' >> /tmp/python3
              chmod +x /tmp/python3
              export PATH=/tmp:$PATH
              echo "Waiting for usbmuxd-bridge socket..."
              while [ ! -S /var/run/usbmuxd ]; do sleep 1; done
              echo "usbmuxd socket ready, starting AltServer"
              exec AltServer
          env:
            - name: ALTSERVER_ANISETTE_SERVER
              value: "http://localhost:6969"
            - name: DBUS_SYSTEM_BUS_ADDRESS
              value: "unix:path=/run/dbus/system_bus_socket"
            - name: USBMUXD_SOCKET_ADDRESS
              value: "unix:/var/run/usbmuxd"
          volumeMounts:
            # iOS device pairing records — MUST persist. Copied in once from your PC.
            - mountPath: /var/lib/lockdown
              name: altserver-data
              subPath: lockdown
            - name: dbus-socket
              mountPath: /run/dbus
            - name: var-run
              mountPath: /var/run
            # Shared with avahi so it can publish _altserver._tcp with the correct port.
            - name: service-info
              mountPath: /tmp/service-info
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

        # ── usbmuxd-bridge ─────────────────────────────────────────────────────
        # iOS 17+ does not reliably advertise _apple-mobdev2._tcp, so netmuxd
        # cannot discover the device via mDNS. This sidecar implements the
        # usbmuxd wire protocol on the shared /var/run/usbmuxd socket, routing
        # Connect requests directly to the iPhone's lockdownd by IP.
        # IPHONE_IP must be stable — configure a DHCP reservation on the router.
        - name: usbmuxd-bridge
          image: python:3.12-slim
          command: ["/bin/sh", "-c", "python3 /app/bridge.py"]
          env:
            - name: IPHONE_IP
              value: "192.168.8.101"
            - name: IPHONE_UDID
              value: "00008101-000E00E01A21001E"
          volumeMounts:
            - name: var-run
              mountPath: /var/run
            - name: altserver-data
              mountPath: /var/lib/lockdown
              subPath: lockdown
            - name: bridge-script
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

        # ── anisette ───────────────────────────────────────────────────────────
        # Generates Apple authentication tokens used during app signing/refresh.
        # AltServer hits this on localhost:6969 for every signing operation.
        # Self-hosting avoids Apple ID lockouts caused by shared public servers.
        - name: anisette
          image: dadoum/anisette-v3-server:latest
          imagePullPolicy: Always
          volumeMounts:
            # Apple Provision libraries (libCoreADI.so etc.) are stored on an
            # emptyDir rather than the Longhorn PVC. Longhorn mounts subPaths as
            # root:root, which causes Permission denied when the non-root
            # 'Alcoholic' user tries to read files extracted from Apple's archive.
            # emptyDir has no such restriction. Downside: ~30 s re-download on
            # every pod restart, which is acceptable for a home cluster.
            - mountPath: /home/Alcoholic/.config/anisette-v3/lib
              name: anisette-lib
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"

      volumes:
        - name: altserver-data
          persistentVolumeClaim:
            claimName: altserver-data
        # Shared D-Bus socket between avahi and altserver containers.
        - name: dbus-socket
          emptyDir: {}
        # Coordination between altserver (writes port) and avahi (reads port,
        # calls avahi-publish-service). Replaces the broken DNSServiceRegister
        # path in the GTA-AltServer image which requires python3 (not present).
        - name: service-info
          emptyDir: {}
        # Ephemeral storage for Apple Provision libraries — re-downloaded on each
        # pod start. Using emptyDir avoids Longhorn's root:root ownership problem.
        - name: anisette-lib
          emptyDir: {}
        # Script for the usbmuxd-bridge sidecar (see configmap.yaml).
        - name: bridge-script
          configMap:
            name: usbmuxd-bridge-script
            defaultMode: 0755
        # Writable /var/run shared by altserver and usbmuxd-bridge so the bridge
        # can create the usbmuxd socket that AltServer connects to.
        - name: var-run
          emptyDir: {}
