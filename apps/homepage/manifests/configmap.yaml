apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: halo
  labels:
    app.kubernetes.io/instance: homepage
data:
  settings.yaml: |
    title: halo cluster
    background:
      image: /images/background.jpg
      blur: xl
      brightness: 55
      saturate: 60
      opacity: 100
    cardBlur: xl
    theme: dark
    color: slate
    headerStyle: boxedWidgets
    hideVersion: true
    layout:
      Infrastructure:
        style: row
        columns: 4
        useEqualHeights: true
      Applications:
        style: row
        columns: 4
        useEqualHeights: true

  custom.css: |
    /*
     * Homepage's default tiles are near-transparent (dark:bg-white/5 = 5%).
     * Over a visible background image the text is unreadable, so give the
     * service cards, bookmark cards and top widget boxes a solid dark
     * (slate-900) backing while keeping the frosted-glass blur.
     *
     * .information-widget-search needs naming on top of .widget-container:
     * the search widget renders via ContainerForm, which (unlike Container)
     * never appends the widget-container class, so it would otherwise keep
     * the default 5% fill and look washed out.
     */
    .service-card,
    .widget-container,
    .information-widget-search,
    .bookmark a {
      background-color: rgba(15, 23, 42, 0.72) !important;
    }

    .service-card:hover,
    .bookmark a:hover {
      background-color: rgba(30, 41, 59, 0.85) !important;
    }

    /* Tone the search input down so it reads as a field on the dark form
     * rather than a bright panel. */
    .information-widget-search input {
      background-color: rgba(255, 255, 255, 0.06) !important;
      border-color: rgba(148, 163, 184, 0.3) !important;
      color: #e2e8f0 !important;
    }

    .information-widget-search input::placeholder {
      color: rgba(226, 232, 240, 0.6) !important;
    }

    /*
     * The section headers sit directly on the (now visible) background image,
     * not on a tile. A text-shadow keeps them legible over bright areas of
     * the photo without having to dim the whole background.
     */
    .service-group-name,
    .bookmark-group-name {
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
    }

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        label: system
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank

  services.yaml: |
    - Infrastructure:
        - Kite:
            href: https://kite.halo.fabseit.net
            description: Kubernetes dashboard
            icon: kubernetes.png
        - ArgoCD:
            href: https://argocd.halo.fabseit.net
            description: GitOps deployments
            icon: argo-cd.png
        - Longhorn:
            href: https://longhorn.halo.fabseit.net
            description: Storage
            icon: longhorn.png
        - Monitoring:
            href: https://monitoring.halo.fabseit.net
            description: Prometheus + Grafana
            icon: grafana.png
        - Pi-hole:
            href: https://pihole.halo.fabseit.net
            description: DNS / ad blocking
            icon: pi-hole.png
        - Uptime Kuma:
            href: https://uptime.halo.fabseit.net
            description: Uptime monitoring
            icon: uptime-kuma.png
        - Speedtest:
            href: https://speedtest.halo.fabseit.net
            description: Network speed test
            icon: speedtest-tracker.png
        - Headplane:
            href: https://headplane.halo.fabseit.net
            description: Headscale web UI
            icon: tailscale.png

    - Applications:
        - Home Assistant:
            href: https://homeassistant.halo.fabseit.net
            description: Home automation
            icon: home-assistant.png
        - Immich:
            href: https://immich.halo.fabseit.net
            description: Photo management
            icon: immich.png
        - Paperless:
            href: https://paperless.halo.fabseit.net
            description: Document management
            icon: paperless-ngx.png
        - n8n:
            href: https://n8n.halo.fabseit.net
            description: Workflow automation
            icon: n8n.png
        - Bitwarden:
            href: https://bitwarden.halo.fabseit.net
            description: Password manager
            icon: bitwarden.png

  bookmarks.yaml: |
    - Network:
        - FritzBox:
            - abbr: FB
              href: http://192.168.8.1
              icon: fritzbox.png
