apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Generate the background image ConfigMap from the real binary file so the repo
# stores a viewable background.jpg (clean diffs) instead of a base64 blob.
# disableNameSuffixHash keeps a stable name (homepage-background) so the existing
# deployment volume reference and the reloader annotation keep working.
configMapGenerator:
  - name: homepage-background
    namespace: halo
    files:
      - background.jpg

generatorOptions:
  disableNameSuffixHash: true
