---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kite-data-pvc
  namespace: kube-system
  labels:
    app: kite
    app.kubernetes.io/instance: kite
    recurring-job-group.longhorn.io/default: "enabled"
    recurring-job.longhorn.io/random-volumes: "enabled"
    recurring-job.longhorn.io/s3-monthly-backup: "enabled"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi 
  storageClassName: longhorn
