name: Renovate

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v46.1.16
        with:
          configurationFile: .github/renovate-global-config.json
          token: ${{ secrets.RENOVATE_TOKEN }}
